<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regex tagging hints — Network 360</title>
    <style>
      :root {
        --bg: #0b0f16; --panel: #11151f; --panel-2: #161b27;
        --border: #222838; --text: #e6e9ef; --muted: #8b93a7;
        --blue: #3b82f6; --green: #16a34a; --radius: 8px;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; background: var(--bg); color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.6;
      }
      main { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
      h1 { font-size: 28px; margin: 0 0 8px; }
      .lede { color: var(--muted); margin: 0 0 32px; }
      article h3 { margin-top: 32px; font-size: 18px; }
      article p { margin: 6px 0; }
      article strong { color: var(--text); }
      hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
      ul { padding-left: 20px; }
      li { margin: 4px 0; }
      code {
        background: var(--panel-2); border: 1px solid var(--border);
        border-radius: 4px; padding: 1px 5px; font-size: 0.9em;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        color: #9ecbff;
      }
      pre {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 14px 16px; overflow-x: auto;
      }
      pre code { background: none; border: none; padding: 0; color: #7ee787; }
      li code { color: #9ecbff; }
      .error { color: #f87171; }
    </style>
  </head>
  <body>
    <main>
      <h1>Regex tagging hints</h1>
      <p class="lede">Reference patterns for auto-tagging sites and devices from their naming conventions.</p>
      <article id="content"><p class="lede">Loading…</p></article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
      (async () => {
        const el = document.getElementById('content')
        try {
          const res = await fetch('regex.md', { cache: 'no-store' })
          if (!res.ok) throw new Error('HTTP ' + res.status)
          const md = await res.text()
          if (window.marked) {
            el.innerHTML = window.marked.parse(md)
          } else {
            // Fallback: show the raw markdown if the renderer failed to load.
            const pre = document.createElement('pre')
            pre.textContent = md
            el.replaceChildren(pre)
          }
        } catch (e) {
          el.innerHTML = '<p class="error">Could not load hints (' + e.message + ').</p>'
        }
      })()
    </script>
  </body>
</html>
